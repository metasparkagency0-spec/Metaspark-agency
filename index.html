<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaSpark Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Inter', sans-serif; background:#0a0a0a; color:#fff; line-height:1.6; scroll-behavior:smooth; }

/* LOGO + NAME */
.logo-name { display:flex; align-items:center; gap:15px; position:fixed; top:15px; left:20px; z-index:1000; }
.logo-name div { width:120px; height:60px; overflow:hidden; }
.logo-name img { width:100%; height:100%; object-fit:contain; }
.logo-name h1 { color:black; font-size:22px; margin:0; font-weight:700; }

/* Hamburger Menu */
nav { position:fixed; top:15px; right:20px; z-index:1000; display:flex; flex-direction:column; align-items:flex-end; }
#hamburger { display:flex; flex-direction:column; gap:5px; cursor:pointer; }
#hamburger span { width:30px; height:3px; background:#fff; border-radius:2px; }
#services-dropdown { display:none; background:#111; padding:10px; border-radius:8px; min-width:220px; flex-direction:column; margin-top:10px; }
#services-dropdown a { color:#fff; text-decoration:none; padding:8px 12px; display:block; transition:0.3s; }
#services-dropdown a:hover { background:#222; color:#ffcc00; }

/* HERO */
.hero { text-align:center; padding:120px 20px; background:linear-gradient(135deg,#ffcc00 0%,#ff9900 100%); color:#111; overflow:hidden; }
.hero h1 { font-size:52px; font-weight:700; margin-bottom:20px; opacity:0; transform:translateY(-30px); animation:fadeInUp 1s forwards; }
.hero p { font-size:16px; margin-bottom:30px; line-height:1.6; opacity:0; transform:translateY(-20px); animation:fadeInUp 1s 0.5s forwards; }
.hero .btn { background:#111; color:#ffcc00; padding:15px 35px; border-radius:10px; font-weight:700; text-decoration:none; transition:transform 0.3s ease; opacity:0; animation:fadeInUp 1s 1s forwards; }
.hero .btn:hover { transform:scale(1.1); box-shadow:0 10px 25px rgba(255,204,0,0.6); }

/* SERVICES */
.services { padding:60px 20px; text-align:center; background:#0a0a0a; }
.services h2 { font-size:40px; color:#ffcc00; margin-bottom:20px; opacity:0; transform:translateY(20px); }
.services p { color:#ccc; font-size:16px; margin-bottom:30px; opacity:0; transform:translateY(20px); }
.cards { display:flex; flex-wrap:wrap; justify-content:center; gap:25px; }
.card { background:#111; padding:30px 20px; border-radius:15px; width:180px; text-align:center; cursor:pointer; transition:0.3s; opacity:0; transform:translateY(20px); }
.card img { width:100%; height:120px; object-fit:cover; margin-bottom:15px; transition: transform 0.5s ease; }
.card:hover img { transform:rotate(15deg) scale(1.1); }
.card:hover { transform:translateY(-15px) scale(1.05); box-shadow:0 15px 30px rgba(255,204,0,0.4); }
.card p { font-weight:600; color:#ccc; font-size:14px; }

/* RESULTS */
#stats { text-align:center; margin:30px 0; font-size:18px; }

/* CONTACT */
#email, #phone { font-size:16px; color:#ccc; margin-bottom:10px; text-align:center; position:relative; }

@keyframes fadeInUp { 0% {opacity:0; transform:translateY(20px);} 100% {opacity:1; transform:translateY(0);} }

/* WhatsApp */
#whatsapp-wrapper { position:fixed; bottom:25px; right:25px; z-index:1000; }
#whatsapp { background:#25D366; color:black; padding:16px 20px; border-radius:50px; text-decoration:none; font-weight:bold; box-shadow:0 8px 25px rgba(0,0,0,0.5); }

/* Footer */
footer { text-align:center; padding:25px; color:#777; border-top:1px solid #222; }
</style>
</head>

<body>

<!-- Logo -->
<div class="logo-name">
  <div><img src="images/logo.png" alt="logo"></div>
  <h1>MetaSpark Agency</h1>
</div>

<!-- Menu -->
<nav>
  <div id="hamburger"><span></span><span></span><span></span></div>
  <div id="services-dropdown">
    <a href="#services">Facebook</a>
    <a href="#services">YouTube</a>
    <a href="#services">Instagram</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>We Bring You Clients 🚀</h1>
  <p>Facebook Ads, Instagram Growth, Shopify, YouTube Automation</p>
</section>

<!-- SERVICES -->
<section id="services" class="services">
  <h2>Our Services</h2>

  <div class="cards">
    <div class="card"><img src="images/Facebook.png"><p>Facebook Ads</p></div>
    <div class="card"><img src="images/Instagram.png"><p>Instagram</p></div>
    <div class="card"><img src="images/TikTok.png"><p>TikTok</p></div>
    <div class="card"><img src="images/YouTube.png"><p>YouTube</p></div>
    <div class="card"><img src="images/Shopify.png"><p>Shopify</p></div>
    <div class="card"><img src="images/Automation.png"><p>Automation</p></div>
    <div class="card"><img src="images/eBay.png"><p>eBay</p></div>
  </div>
</section>

<!-- WhatsApp -->
<div id="whatsapp-wrapper">
  <a id="whatsapp" href="https://wa.me/923030607545">WhatsApp</a>
</div>

<footer>© 2026 MetaSpark Agency</footer>

</body>
                        </html>
