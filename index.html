<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaSpark Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Inter', sans-serif; background:#0a0a0a; color:#fff; line-height:1.6; }

/* ✅ HEADER (FIXED ISSUE SOLVED) */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111;
}

/* LOGO */
.logo-name { display:flex; align-items:center; gap:15px; }
.logo-name img { height:50px; }
.logo-name h1 { color:#fff; font-size:20px; margin:0; }

/* MENU */
nav { position:relative; }
#hamburger { display:flex; flex-direction:column; gap:5px; cursor:pointer; }
#hamburger span { width:30px; height:3px; background:#fff; }

#services-dropdown {
  display:none;
  position:absolute;
  right:0;
  background:#111;
  padding:10px;
  border-radius:8px;
}

#services-dropdown a {
  display:block;
  color:#fff;
  text-decoration:none;
  padding:8px;
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#ffcc00,#ff9900);
  color:#111;
}

.hero h1 { font-size:40px; }

.btn {
  background:#111;
  color:#ffcc00;
  padding:12px 25px;
  border-radius:8px;
  text-decoration:none;
  display:inline-block;
  margin-top:15px;
}

/* SERVICES */
.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:10px;
  width:160px;
  text-align:center;
}

.card img { width:100%; height:100px; object-fit:cover; }

/* WHATSAPP */
#whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50px;
  color:#fff;
  text-decoration:none;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="logo-name">
    <img src="images/logo.png">
    <h1>MetaSpark Agency</h1>
  </div>

  <nav>
    <div id="hamburger">
      <span></span><span></span><span></span>
    </div>

    <div id="services-dropdown">
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">Shopify</a>
    </div>
  </nav>

</div>

<!-- HERO -->
<section class="hero">
  <h1>We Bring You Clients 🚀</h1>
  <p>Grow your business with ads & automation</p>
  <a href="https://wa.me/923030607545" class="btn">Get Clients</a>
</section>

<!-- SERVICES -->
<div class="cards">
  <div class="card"><img src="images/Facebook.png">Facebook Ads</div>
  <div class="card"><img src="images/Instagram.png">Instagram</div>
  <div class="card"><img src="images/TikTok.png">TikTok</div>
  <div class="card"><img src="images/Shopify.png">Shopify</div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/923030607545" id="whatsapp">WhatsApp</a>

<script>
document.getElementById("hamburger").onclick = function(){
  let menu = document.getElementById("services-dropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
                          </html>
