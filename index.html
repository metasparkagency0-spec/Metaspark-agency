<!DOCTYPE html>

<head>

<title>MetaSpark Agency</title>

<style>

/* RESET */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 🔥 TOP BAR (LEADS LINE) */
.top-bar {
  background: #000;
  color: #ffcc00;
  text-align: center;
  padding: 8px;
  font-size: 13px;
  font-weight: bold;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #fff;
}

.nav-left {
  font-size: 22px;
  cursor: pointer;
}

.nav-center {
  text-align: center;
}

.nav-center img {
  width: 80px;
}

.tagline {
  font-size: 10px;
  letter-spacing: 2px;
  color: #999;
}

.nav-right {
  font-size: 18px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: #f5f5f5;
}

.mini-title {
  border: 1px solid #ccc;
  display: inline-block;
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 12px;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: 38px;
  margin: 10px 0;
}

.sub-text {
  color: #555;
  margin-bottom: 25px;
}

/* BUTTONS */
.hero-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  padding: 14px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

.primary {
  background: #000;
  color: #fff;
}

.secondary {
  border: 2px solid #000;
  color: #000;
}

/* CONTACT */
.contact-info {
  margin-top: 25px;
  font-size: 14px;
  color: #666;
}

</style>
</head>

<!-- 🔥 TOP BAR -->
<a href="https://wa.me/923030607545" class="top-bar">

  <div class="nav-right">🔍 🛒 👤</div>
