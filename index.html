<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaSpark Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* TOP BAR */
.top-bar{
  background:#000;
  color:#ffcc00;
  text-align:center;
  padding:8px;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111;
}

.logo{
  height:50px;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#ffcc00,#ff8800);
  color:#111;
}

.hero img{
  width:220px;
  margin-bottom:20px;
}

.hero h1{font-size:40px;}

.btn{
  padding:14px 30px;
  background:#111;
  color:#ffcc00;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
  margin-top:15px;
}

/* SERVICES */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px 20px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:170px;
  text-align:center;
}

.card img{
  width:50px;
  margin-bottom:10px;
}

/* RESULTS IMAGE */
.results img{
  width:100%;
  max-width:400px;
  border-radius:15px;
  margin-top:20px;
}

/* TESTIMONIAL */
.testimonial{
  background:#111;
  margin:10px auto;
  padding:20px;
  max-width:400px;
  border-radius:10px;
}

/* FORM */
form{
  max-width:400px;
  margin:auto;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50px;
  color:#fff;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="top-bar">
🚀 Get 20–50 Clients Every Month
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div>☰</div>
  <img src="images/logo.png" class="logo">
  <div>⚙️</div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="images/banner.png" alt="">
  <h1>We Bring You Clients</h1>
  <p>Grow your business with ads & automation</p>
  <a href="https://wa.me/923030607545" class="btn">Get Clients</a>
</section>

<!-- SERVICES -->
<section>
  <h2 style="text-align:center;">Our Services</h2>

  <div class="cards">
    <div class="card">
      <img src="images/facebook.png">
      Facebook Ads
    </div>

    <div class="card">
      <img src="images/instagram.png">
      Instagram Growth
    </div>

    <div class="card">
      <img src="images/tiktok.png">
      TikTok Ads
    </div>

    <div class="card">
      <img src="images/youtube.png">
      YouTube Ads
    </div>
  </div>
</section>

<!-- RESULTS -->
<section class="results" style="text-align:center;padding:40px;">
  <h2>Our Results</h2>
  <img src="images/banner.png">
</section>

<!-- TESTIMONIAL -->
<section>
  <h2 style="text-align:center;">Clients Say</h2>

  <div class="testimonial">“Got 50+ leads in 10 days 🔥”</div>
  <div class="testimonial">“Best agency 💯”</div>
</section>

<!-- FORM -->
<section style="text-align:center;padding:40px;">
  <h2>Free Audit</h2>

  <form>
    <input placeholder="Your Name">
    <input placeholder="Your Business">
    <textarea placeholder="Your Goal"></textarea>
    <button style="padding:10px;background:#25D366;color:#fff;border:none;border-radius:8px;">Submit</button>
  </form>
</section>

<a href="https://wa.me/923030607545" class="whatsapp">WhatsApp</a>

</body>
        </html>
